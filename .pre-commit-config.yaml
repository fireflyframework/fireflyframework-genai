# Pre-commit hooks for fireflyframework-agentic.
#
# Install once per clone:
#   uv sync --extra dev
#   uv run pre-commit install
#
# Run manually on the whole repo:
#   uv run pre-commit run --all-files
#
# Update hook versions:
#   uv run pre-commit autoupdate

minimum_pre_commit_version: "3.8.0"
fail_fast: false

# Bundled frontend build artifacts — checked in but not source code.
exclude: |
  (?x)^(
    studio-desktop/frontend-dist/.*|
    src/fireflyframework_agentic/studio/static/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        # tsconfig*.json files use JSONC (comments, trailing commas).
        exclude: ^.*tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-ast
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
