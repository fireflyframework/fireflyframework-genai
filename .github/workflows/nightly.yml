name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: uv sync --extra dev --extra azure --extra mcp --extra rest
      - run: uv run pytest --cov --cov-report=term-missing --durations=50

  report-failure:
    name: Report failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-failure';
            const title = 'Nightly run failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly run failed on \`${context.sha.substring(0, 7)}\` (${new Date().toISOString().slice(0, 10)}).`,
              ``,
              `Run: ${runUrl}`,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: 'd73a4a',
                description: 'Tracks failures of the scheduled Nightly workflow',
              });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (open.data.length > 0) {
              const issue = open.data[0];
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body,
              });
              core.notice(`Commented on existing issue #${issue.number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: [label, 'bug'],
              });
              core.notice(`Created issue #${created.data.number}.`);
            }

  close-issue-on-success:
    name: Close tracking issue on success
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 10,
            });

            for (const issue of open.data) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `Nightly run succeeded on \`${context.sha.substring(0, 7)}\`. Closing. Run: ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
  benchmark:
    name: Benchmark (corpus-search, real mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: uv sync --extra corpus-search

      # Detect whether the embedding secrets are present without printing their
      # values. Secrets are mapped to env vars first so they never appear in
      # the if-expression itself.
      - name: Check embedding secrets
        id: secrets
        run: |
          if [[ -n "$EMBEDDING_HOST" && -n "$EMBEDDING_KEY" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "EMBEDDING_BINDING_HOST / EMBEDDING_BINDING_API_KEY not configured -- skipping real-mode benchmark."
          fi
        env:
          EMBEDDING_HOST: ${{ secrets.EMBEDDING_BINDING_HOST }}
          EMBEDDING_KEY: ${{ secrets.EMBEDDING_BINDING_API_KEY }}

      - name: Run real-mode benchmark
        if: steps.secrets.outputs.available == 'true'
        env:
          EMBEDDING_BINDING_HOST: ${{ secrets.EMBEDDING_BINDING_HOST }}
          EMBEDDING_BINDING_API_KEY: ${{ secrets.EMBEDDING_BINDING_API_KEY }}
        run: |
          uv run python tests/examples/corpus_search/benchmark/runner.py \
            --mode real \
            --json tests/examples/corpus_search/benchmark/runs/nightly_real.json \
            --baseline tests/examples/corpus_search/benchmark/runs/baseline_real.json \
            --regression-tolerance 0.02
