name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --extra dev
      - run: uv run pytest --cov --cov-report=term-missing --durations=50

  report-failure:
    name: Report failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-failure';
            const title = 'Nightly run failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly run failed on \`${context.sha.substring(0, 7)}\` (${new Date().toISOString().slice(0, 10)}).`,
              ``,
              `Run: ${runUrl}`,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (err) {
              if (err.status !== 404) throw err;
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: 'd73a4a',
                description: 'Tracks failures of the scheduled Nightly workflow',
              });
            }

            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (open.data.length > 0) {
              const issue = open.data[0];
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body,
              });
              core.notice(`Commented on existing issue #${issue.number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: [label, 'bug'],
              });
              core.notice(`Created issue #${created.data.number}.`);
            }

  close-issue-on-success:
    name: Close tracking issue on success
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'nightly-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const open = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 10,
            });

            for (const issue of open.data) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: `Nightly run succeeded on \`${context.sha.substring(0, 7)}\`. Closing. Run: ${runUrl}`,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
